<div class="search-container">
  <h1 class="search-title">Buscador de contratos</h1>
  <input
    type="text"
    class="search-input"
    [formControl]="searchControl"
    placeholder="Busca por administradora, NIT o número de contrato…"
    autocomplete="off"
  />

  @if (isLoading) {
    <div class="loading">Buscando…</div>
  }

  @if ((resultados$ | async); as resultados) {
    <ul class="resultados">
      @for (contrato of resultados; track contrato.id) {
        <li>
          <button type="button" (click)="seleccionarContrato(contrato.id)">
            <span class="r-num">{{ contrato.numero_contrato }}</span>
            <span class="r-admin">{{ contrato.administradora?.nombre }}</span>
            <span class="r-meta">
              NIT {{ contrato.administradora?.nit }}
              @if (contrato.regimen_estimado) {
                · {{ contrato.regimen_estimado }}
              }
            </span>
          </button>
        </li>
      }
      @if (resultados.length === 0 && searchControl.value) {
        <li class="vacio">No se encontraron contratos.</li>
      }
    </ul>
  }
</div>
